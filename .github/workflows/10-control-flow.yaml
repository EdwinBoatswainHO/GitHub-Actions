name: 10 - Controlling the Execution Flow

on:
    workflow_dispatch:
        inputs:
            pass-unit-tests:
                type: boolean
                description: Whether unit tests will pass or not
                default: true

jobs:
    lint-build:
        runs-on: ubuntu-latest
        steps:
            - name: Lint and build
              run: echo linting and building project
    unit-tests:
        runs-on: ubuntu-latest
        steps:
            - name: Unit Tests
              run: echo Running unit tests
            - name: Failing tests
              if: ${{!inputs.pass-unit-tests}}
              run: exit 1
    deploy-nonprod:
        runs-on: ubuntu-latest
        needs:
            - lint-build
            - unit-tests
        steps:
            - name: Deploy non-prod
              run: echo deploying to non-prod
    e2e-tests:
        runs-on: ubuntu-latest
        needs:
            - deploy-nonprod
        steps:
            - name: E2E Tests
              run: echo End to end testing
    load-tests:
        runs-on: ubuntu-latest
        needs:
            - deploy-nonprod
        steps:
            - name: Load Tests
              run: echo Load testing
    deploy-prod:
        runs-on: ubuntu-latest
        needs:
            - e2e-tests
            - load-tests
        steps:
            - name: Deploying to prod
            
              run: echo Deploying to prod